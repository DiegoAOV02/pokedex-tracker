name: CI Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Paso de diagnóstico: Verificamos qué archivos hay en el runner
      - name: Debug Files
        run: ls -la

      - name: Install dependencies
        # Añadimos --no-frozen-lockfile solo esta vez para que genere uno nuevo si hay discrepancias
        # Y forzamos a que ignore configuraciones de workspace
        run: pnpm install --no-frozen-lockfile

      - name: Lint and Format Check
        run: make format-check

      - name: Build Next.js
        run: make build
        env:
          NODE_ENV: production
